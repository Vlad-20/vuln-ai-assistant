services:
  dvwa:
    image: ghcr.io/digininja/dvwa:latest
    ports:
      - "4280:80"
    environment:
      DEFAULT_SECURITY_LEVEL: low
      DVWA_DISABLE_AUTH: "true"
      DB_SERVER: dvwa-db
    networks:
      scan-net:
        aliases:
          - dvwa
    depends_on:
      - dvwa-db
    restart: unless-stopped

  dvwa-db:
    image: mariadb:10
    environment:
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: p@ssw0rd
      MYSQL_ROOT_PASSWORD: dvwa
      MYSQL_DATABASE: dvwa
    volumes:
      - dvwa-data:/var/lib/mysql
    networks:
      scan-net:
        aliases:
          - dvwa-db
    restart: unless-stopped

  juice-shop:
    image: bkimminich/juice-shop
    ports:
      - "3000:3000"
    networks:
      scan-net:
        aliases:
          - juice-shop
    restart: unless-stopped

  vulnerable-wp:
    image: wordpress:5.0-php7.1-apache
    ports:
      - "8081:80"
    environment:
      WORDPRESS_DB_HOST: wp-db
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
    networks:
      scan-net:
        aliases:
          - vulnerable-wp
    depends_on:
      - wp-db
    restart: unless-stopped

  wp-db:
    image: mariadb:10
    environment:
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppass
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wordpress
    volumes:
      - wp-data:/var/lib/mysql
    networks:
      scan-net:
        aliases:
          - wp-db
    restart: unless-stopped

networks:
  scan-net:
    external: true

volumes:
  dvwa-data:
  wp-data:
