services:
  nmap:
    image: instrumentisto/nmap:latest
    entrypoint: nmap
    networks:
      - scan-net
    volumes:
      - ./output:/output

  subfinder:
    image: projectdiscovery/subfinder:latest
    entrypoint: subfinder
    networks:
      - scan-net
    volumes:
      - ./output:/output

  httpx:
    image: projectdiscovery/httpx:latest
    entrypoint: httpx
    networks:
      - scan-net
    volumes:
      - ./output:/output

  feroxbuster:
    image: epi052/feroxbuster:latest
    entrypoint: feroxbuster
    networks:
      - scan-net
    volumes:
      - ./output:/output
      - ./wordlists:/wordlists

  katana:
    image: projectdiscovery/katana:latest
    entrypoint: katana
    network_mode: host
    volumes:
      - ./output:/output

  wpscan:
    image: wpscanteam/wpscan:latest
    networks:
      - scan-net
    volumes:
      - ./output:/output

  nuclei:
    image: projectdiscovery/nuclei:latest
    entrypoint: nuclei
    networks:
      - scan-net
    volumes:
      - ./output:/output

networks:
  scan-net:
    external: true