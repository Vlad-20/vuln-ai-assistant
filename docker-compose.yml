services:
  nmap:
    image: instrumentisto/nmap:latest
    entrypoint: nmap
    volumes:
      # Mount a local './output' dir into the container's '/output'
      # This is how we get results back to the host
      - ./output:/output

  subfinder:
    image: projectdiscovery/subfinder:latest
    entrypoint: subfinder
    volumes:
      - ./output:/output

  httpx:
    image: projectdiscovery/httpx:latest
    entrypoint: httpx
    volumes:
      - ./output:/output

  feroxbuster:
    image: epi052/feroxbuster:latest
    entrypoint: feroxbuster
    volumes:
      - ./output:/output
      # Place wordlists (e.g. common.txt) in ./wordlists on the host
      - ./wordlists:/wordlists

  katana:
    image: projectdiscovery/katana:latest
    entrypoint: katana
    volumes:
      - ./output:/output

  wpscan:
    image: wpscanteam/wpscan:latest
    volumes:
      - ./output:/output

  nuclei:
    image: projectdiscovery/nuclei:latest
    entrypoint: nuclei
    volumes:
      # Same volume mount for nuclei
      - ./output:/output
